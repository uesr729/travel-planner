# ============================================================
# docker-compose.yml — AI 旅行规划师
# 一键启动: docker compose up -d
# 查看日志: docker compose logs -f
# 停止服务: docker compose down
# ============================================================
services:
  travel-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-planner
    ports:
      - "5000:5000"
    environment:
      # 高德地图 API Key（真实景点 POI 数据）
      - AMAP_API_KEY=2c34ce35da386298637d5771bfc488bc
      # Flask 密钥（生产环境请修改）
      - FLASK_SECRET_KEY=travel-planner-docker-secret-key
      # 数据库路径（SQLite 挂载到卷，重启不丢失）
      - DATABASE_URL=sqlite:///app/instance/travel_planner.db
      # DeepSeek 可选
      # - DEEPSEEK_API_KEY=your_key_here
      # - DEEPSEEK_API_BASE=https://api.deepseek.com/v1
      # OpenWeather 可选
      # - OPENWEATHER_API_KEY=your_key_here
    volumes:
      # 持久化 SQLite 数据库
      - travel_data:/app/instance
    restart: unless-stopped

volumes:
  travel_data:
